<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Tanulási módszerek</title>
    <link rel="stylesheet" href="/animations.css">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
            background: #243244;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        #detailBox {
            margin-top: 20px;
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h1>Tanulási módszerek</h1>

<div class="card" onclick="showMethod('pomodoro')">
    <h2>Pomodoro technika</h2>
    <p>25 perc tanulás, 5 perc szünet</p>
</div>

<div class="card" onclick="showMethod('active')">
    <h2>Active Recall</h2>
    <p>Felidézés alapú tanulás</p>
</div>

<div class="card" onclick="showMethod('spaced')">
    <h2>Spaced Repetition</h2>
    <p>Időzített ismétlés</p>
</div>

<div id="detailBox"></div>

<button onclick="goHome()">Vissza</button>

<script>

    const methods = {
        pomodoro: `
Pomodoro technika:

Ez egy fókusz alapú tanulási módszer.

Hogyan működik:
- 25 percig koncentráltan tanulsz
- 5 perc szünet
- 4 ciklus után hosszabb szünet

Miért jó:
- csökkenti a fáradtságot
- segít fenntartani a fókuszt
- lebontja a tanulást kezelhető részekre
        `,

        active: `
Active Recall:

Ez a leghatékonyabb tanulási módszerek egyike.

Lényege:
- nem olvasod újra az anyagot
- hanem megpróbálod FELIDÉZNI

Példa:
- kérdéseket teszel fel magadnak
- letakarod a jegyzetet és visszamondod

Miért működik:
- erősíti a memóriát
- mélyebb megértést ad
        `,

        spaced: `
Spaced Repetition:

Ez az ismétléses tanulás módszere.

Lényege:
- nem egyszer tanulsz meg valamit
- hanem időközönként ismétled

Példa:
- 1. nap tanulás
- 2. nap ismétlés
- 5. nap ismétlés
- 10. nap ismétlés

Miért hatékony:
- hosszú távú memóriát épít
        `
    };

    function showMethod(key) {
        const box = document.getElementById("detailBox");
        box.style.display = "block";
        box.innerText = methods[key];
    }

    function goHome() {
        window.location.href = "/index.html";
    }

</script>

</body>
</html>
