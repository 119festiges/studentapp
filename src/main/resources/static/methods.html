<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Study Techniques</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #020617, #0f172a, #020617);
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: translateX(6px);
            border-color: rgba(249, 115, 22, 0.5);
        }

        .card h2 {
            margin: 0 0 6px 0;
            font-size: 1.2rem;
        }

        .card p {
            margin: 0;
            color: #94a3b8;
        }

        #detailBox {
            max-width: 800px;
            margin: 25px auto;
            padding: 20px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 14px;
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        button {
            display: block;
            margin: 30px auto 0;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            background: transparent;
            color: #60a5fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<h1>Study Techniques</h1>

<div class="grid">

    <div class="card" onclick="showMethod('pomodoro')">
        <h2>Pomodoro Technique</h2>
        <p>25 minutes study, 5 minutes break</p>
    </div>

    <div class="card" onclick="showMethod('active')">
        <h2>Active Recall</h2>
        <p>Memory-based learning</p>
    </div>

    <div class="card" onclick="showMethod('spaced')">
        <h2>Spaced Repetition</h2>
        <p>Timed repetition system</p>
    </div>

</div>

<div id="detailBox"></div>

<button onclick="goHome()">Back</button>

<script>

    const methods = {
        pomodoro: `Pomodoro Technique:

A focus-based study method.

How it works:
- 25 minutes focused study
- 5 minutes break
- long break after 4 cycles

Benefits:
- better focus
- less burnout
- structured learning`,

        active: `Active Recall:

Core idea:
- do not reread
- actively retrieve information

Method:
- ask yourself questions
- hide notes and recall
- self-testing

Benefits:
- stronger memory
- deeper understanding`,

        spaced: `Spaced Repetition:

Core idea:
- repeat at intervals

Example:
- day 1: study
- day 2: review
- day 5: review
- day 10: review

Benefits:
- long-term retention`
    };

    function showMethod(key) {
        const box = document.getElementById("detailBox");
        box.style.display = "block";
        box.innerText = methods[key];
    }

    function goHome() {
        window.location.href = "/index.html";
    }

</script>

</body>
</html>
