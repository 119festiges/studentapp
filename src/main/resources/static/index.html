<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>StudentApp</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Poppins',sans-serif;
            background: linear-gradient(to bottom right,#020617,#0f172a,#020617);
            color:#e2e8f0;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            position:relative;
        }

        #authBox {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(2,6,23,0.9);
            z-index: 999;
        }

        .auth-card {
            background: rgba(30,41,59,0.6);
            padding: 30px;
            border-radius: 16px;
            width: 300px;
            text-align: center;
        }

        input {
            width:100%;
            padding:10px;
            margin:8px 0;
            border-radius:10px;
            border:none;
        }

        .container { max-width:1000px; padding:40px; text-align:center; }

        h1 { font-size:64px; margin-bottom:10px; }

        .subtitle { color:#94a3b8; margin-bottom:30px; }

        .grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

        .card {
            background:rgba(30,41,59,0.5);
            border-radius:20px;
            padding:30px;
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover { transform:translateY(-6px) scale(1.05); }

        .icon { font-size:30px; margin-bottom:10px; }

        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        button {
            padding:8px 12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div id="authBox">
    <div class="auth-card">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">

    <div class="topbar">
        <div id="welcome">Welcome</div>
        <button onclick="logout()">Logout</button>
    </div>

    <h1>Future of Learning</h1>
    <p class="subtitle">Choose your path to master new skills</p>

    <div class="grid">

        <div class="card" onclick="location.href='learn.html'">
            <div class="icon">✨</div>
            <h3>Smart Summaries</h3>
        </div>

        <div class="card" onclick="location.href='custom.html'">
            <div class="icon">🧠</div>
            <h3>Personalized Learning</h3>
        </div>

        <div class="card" onclick="location.href='methods.html'">
            <div class="icon">📚</div>
            <h3>Study Techniques</h3>
        </div>

        <div class="card" onclick="location.href='famous.html'">
            <div class="icon">⭐</div>
            <h3>Famous Methods</h3>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
        signOut
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
        getFirestore,
        doc,
        getDoc,
        setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBNeDo_weW1EdcDd-UdYcb4VikuW1dJDgc",
        authDomain: "study-app-c2f91.firebaseapp.com",
        projectId: "study-app-c2f91",
        storageBucket: "study-app-c2f91.firebasestorage.app",
        messagingSenderId: "547026058302",
        appId: "1:547026058302:web:24e28e5d48a5e29827256f",
        measurementId: "G-XFY7ML221S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* ===================== AUTH ===================== */

    window.register = async function () {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, pass);

            const userRef = doc(db, "users", userCred.user.uid);

            await setDoc(userRef, {
                email: email,
                xp: 0,
                level: 1,
                createdAt: Date.now()
            });

            alert("Account created!");
        } catch (e) {
            alert("Register error: " + e.message);
        }
    };

    window.login = async function () {
        const email = document.getElementById("email").value;
        const pass = document.getElementById("password").value;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            alert("Login error: " + e.message);
        }
    };

    window.logout = async function () {
        await signOut(auth);
    };


    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            document.getElementById("authBox").style.display = "flex";
            document.getElementById("app").style.display = "none";
            return;
        }

        document.getElementById("authBox").style.display = "none";
        document.getElementById("app").style.display = "block";

        const userRef = doc(db, "users", user.uid);
        const snap = await getDoc(userRef);

        if (!snap.exists()) {
            await setDoc(userRef, {
                email: user.email,
                xp: 0,
                level: 1,
                createdAt: Date.now()
            });
        }

        const data = (await getDoc(userRef)).data();

        document.getElementById("welcome").innerText =
            "Welcome, " + (data.email || user.email);
    });
</script>

</body>
</html>
