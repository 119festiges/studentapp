<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personalized Learning</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #020617, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 650px;
            background: rgba(30,41,59,0.5);
            border: 1px solid rgba(51,65,85,0.6);
            border-radius: 18px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(51,65,85,0.6);
            background: rgba(15,23,42,0.7);
            color: white;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        textarea { height: 120px; resize: none; }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background: linear-gradient(to right, #a855f7, #ec4899);
            color: white;
        }

        #result {
            margin-top: 20px;
            background: rgba(15,23,42,0.8);
            padding: 15px;
            border-radius: 12px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Personalized Learning</h1>

    <p>Describe how you learn and get a custom plan:</p>

    <textarea id="input" placeholder="e.g. I struggle with focus, I procrastinate..."></textarea>

    
    <select id="learningStyle">
        <option value="visual">Visual learner</option>
        <option value="photographic">Photographic memory</option>
        <option value="auditory">Auditory learner</option>
        <option value="reading">Reading/Writing learner</option>
        <option value="kinesthetic">Kinesthetic learner</option>
    </select>

    <button onclick="analyze()">Generate Plan</button>

    <div id="result"></div>

</div>

<script>
    function analyze() {
        const text = document.getElementById("input").value;
        const style = document.getElementById("learningStyle").value;

        document.getElementById("result").innerText = "Analyzing...";

        fetch('http://localhost:8081/api/summarize', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                text:
                    `Act as a strict but helpful study coach.
Adapt the plan to learning style: ${style}

Give:
- daily routine
- exercises
- study strategy

User input:
${text}`
            })
        })
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }
</script>

</body>
</html>
