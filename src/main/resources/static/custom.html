<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Személyre szabás</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="/ai.js"></script>
    <style>

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
        }


    </style>
</head>
<body>

<h1>Személyre szabott tanulás</h1>

<p>Írd le hogyan tanulsz, és adok javaslatot:</p>

<textarea id="input"></textarea>

<button onclick="analyze()">Elemzés</button>

<div id="result"></div>

<button onclick="goHome()">Vissza</button>

<script>
    function analyze() {
        const text = document.getElementById("input").value;

        document.getElementById("result").innerText = "Elemzés...";

        fetch('http://localhost:8081/api/summarize', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                text: "Do not summarize. Act like a strict but helpful study coach. Give a daily routine, concrete exercises, and subject-specific study methods."+ text
            })
        })
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }

    function goHome() {
        window.location.href = "/index.html";
    }
</script>

</body>
</html>
