<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Famous Learning Methods</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #020617, #0f172a, #020617);
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: rgba(30,41,59,0.5);
            border: 1px solid rgba(51,65,85,0.6);
            border-radius: 14px;
            padding: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: rgba(34,197,94,0.5);
        }

        .detail {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(15,23,42,0.8);
            border-radius: 12px;
            display: none;
        }
    </style>
</head>

<body>

<h1>Famous Learning Methods</h1>

<div class="grid">

    <div class="card" onclick="openPerson('elon')"><h3>Elon Musk</h3></div>
    <div class="card" onclick="openPerson('bill')"><h3>Bill Gates</h3></div>
    <div class="card" onclick="openPerson('einstein')"><h3>Albert Einstein</h3></div>
    <div class="card" onclick="openPerson('jobs')"><h3>Steve Jobs</h3></div>

</div>

<div id="detail" class="detail"></div>

<script>
    const data = {
        elon: "First principles thinking: break everything into fundamentals.",
        bill: "Deep focus + reading + structured learning.",
        einstein: "Visual thinking and mental experiments.",
        jobs: "Simplicity and focus on essentials."
    };

    function openPerson(key) {
        const box = document.getElementById("detail");
        box.style.display = "block";
        box.innerText = data[key];
    }
</script>

</body>
</html>
