<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Learning AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom right, #020617, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container {
            width: 650px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 18px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        textarea, select {
            width: 100%;
            border-radius: 12px;
            border: 1px solid rgba(51,65,85,0.6);
            background: rgba(15,23,42,0.7);
            color: white;
            padding: 12px;
            margin-bottom: 12px;
        }

        textarea {
            height: 160px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(to right, #3b82f6, #06b6d4);
            color: white;
            font-weight: 600;
            margin-top: 8px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row button {
            width: 100%;
        }

        #result {
            margin-top: 20px;
            background: rgba(15,23,42,0.8);
            padding: 15px;
            border-radius: 12px;
            white-space: pre-wrap;
            min-height: 100px;
        }

        #xpBox {
            margin-bottom: 10px;
            font-size: 14px;
            color: #93c5fd;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Smart Learning AI</h1>

    <div id="xpBox">XP: loading...</div>

    <textarea id="note" placeholder="Paste your text here..."></textarea>

    <select id="mode">
        <option value="short">Short summary</option>
        <option value="long">Detailed summary</option>
    </select>

    <button onclick="summarize()">Generate Summary</button>

    <div class="row">
        <button onclick="generateKeywords()">Keywords</button>
        <button onclick="generateQuestions()">Questions</button>
    </div>

    <div id="result"></div>

</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getAuth,
        onAuthStateChanged,
        setPersistence,
        browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import {
        getFirestore,
        doc,
        getDoc,
        updateDoc,
        increment,
        setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    /* 游댠 FIREBASE CONFIG (IDE KELL VAL칍DI) */
    const firebaseConfig = {
        apiKey: "AIzaSyBNeDo_weW1EdcDd-UdYcb4VikuW1dJDgc",
        authDomain: "study-app-c2f91.firebaseapp.com",
        projectId: "study-app-c2f91",
        storageBucket: "study-app-c2f91.firebasestorage.app",
        messagingSenderId: "547026058302",
        appId: "1:547026058302:web:24e28e5d48a5e29827256f",
        measurementId: "G-XFY7ML221S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    setPersistence(auth, browserLocalPersistence);

    async function ensureUserDoc(uid, email) {
        const ref = doc(db, "users", uid);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            await setDoc(ref, {
                email: email,
                xp: 0,
                level: 1
            });
        }
    }

    async function addXP(amount) {
        if (!currentUser) {
            console.log("NO USER -> XP NOT ADDED");
            return;
        }

        try {
            const ref = doc(db, "users", currentUser.uid);

            await updateDoc(ref, {
                xp: increment(amount)
            });

            loadXP();

            console.log("XP +", amount);

        } catch (e) {
            console.error("XP ERROR:", e);
        }
    }

    async function loadXP() {
        if (!currentUser) return;

        const ref = doc(db, "users", currentUser.uid);
        const snap = await getDoc(ref);

        document.getElementById("xpBox").innerText =
            "XP: " + (snap.data()?.xp || 0);
    }

    onAuthStateChanged(auth, async (user) => {

        console.log("AUTH:", user);

        if (user) {
            currentUser = user;

            await ensureUserDoc(user.uid, user.email);

            loadXP();
        } else {
            currentUser = null;
            document.getElementById("xpBox").innerText = "XP: 0";
        }
    });

    function fakeAI(type, text) {

        const cleaned = text.trim();
        if (!cleaned) return "Please enter text first.";

        if (type === "summary") {
            return "SUMMARY:\n\n" +
                cleaned.split(".").slice(0, 3).join(". ");
        }

        if (type === "keywords") {
            const words = cleaned
                .replace(/[^a-zA-Z치칠칤칩칬콈칲콤츼칄칈칍칐콇칖콣 ]/g, "")
                .split(" ")
                .filter(w => w.length > 5)
                .slice(0, 10);

            return "KEYWORDS:\n\n- " + words.join("\n- ");
        }

        if (type === "questions") {
            return "QUESTIONS:\n\n" +
                "1. What is the main idea?\n" +
                "2. Explain it in your own words.\n" +
                "3. What are key concepts?\n" +
                "4. How can it be used?\n" +
                "5. What is important?";
        }
    }

    window.summarize = function () {
        const note = document.getElementById("note").value;
        const mode = document.getElementById("mode").value;

        document.getElementById("result").innerText =
            fakeAI("summary", note);

        addXP(mode === "long" ? 15 : 10);
    };

    window.generateKeywords = function () {
        const note = document.getElementById("note").value;

        document.getElementById("result").innerText =
            fakeAI("keywords", note);

        addXP(5);
    };

    window.generateQuestions = function () {
        const note = document.getElementById("note").value;

        document.getElementById("result").innerText =
            fakeAI("questions", note);

        addXP(8);
    };

</script>

</body>
</html>
